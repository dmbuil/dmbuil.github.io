# Site Settings
name: dmbuil
title: dmbuil | Dario's personal site
description: dmbuil's personal site.
tags:
  - blog
  - jekyll
  - theme
email: dariomartinbuil@outlook.com
disqus_username:
show_hero: true
menu:
  - title: Home
    url: /
  - title: "About"
    url: /about-en
#  - title: "🇪🇸 Sobre mí"
#    url: /about-es
  - title: Contact
    url: /contact
  - title: Tags
    url: /tags
  - title: Feed
    url: /feed.xml

# Social Media Settings
# Remove the item if you don't need it
github_username: dmbuil
facebook_username: 
twitter_username: 
instagram_username: 
linkedin_username: dariomartinbuil
medium_username: 
keybase_username: dmbuil

# Posts Settings
show_time_bar: true
show_modal_on_exit: false
show_modal_on_finish_post: true
two_columns_layout: true

# Advanced Settings
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://dmbuil.github.io" # the base hostname & protocol for your site
google_analytics: "G-5MD5SLR3PW" # GA4
language: "en"
categories_folder: category
sent_message_url: "/contact/message-sent/"
formspree_endpoint: "xeqdzyrw"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/
collections:
  authors:
    output: true
paginate_path: "/page/:num/"
show_get_theme_btn: true
use_logo: false

# Content paginator
paginate_content:
  enabled: false
  debug: false
  collections:
    - posts
  auto: false
  separator: "--page-break--"
  permalink: "/:num/"
  seo_canonical: true
  properties:
    part:
      is_generated: true
    last:
      is_generated: true
    single:
      is_generated: true

# SASS
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-paginate-content

# Exclude my node related stuff
exclude: [
  'package.json',
  'package-lock.json',
  'src',
  'node_modules',
  'initpost.sh',
  'Gemfile',
  'Gemfile.lock',
  'gulpfile.js',
  'README.md',
  'vendor'
]

# Theme
version: v0.0.5beta
